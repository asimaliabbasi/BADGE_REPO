<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Rose Day Asim 🌹</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 25px;
      padding: 35px 30px;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      animation: popIn 1.2s ease;
      position: relative;
      z-index: 2;
    }

    @keyframes popIn {
      0% { transform: scale(0.7); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      color: #e63946;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .rose {
      font-size: 70px;
      margin: 15px 0;
      animation: float 2s infinite ease-in-out;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    p {
      color: #444;
      font-size: 16px;
      line-height: 1.7;
    }

    .name {
      margin-top: 15px;
      font-weight: bold;
      color: #e63946;
      font-size: 18px;
    }

    button {
      margin-top: 22px;
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #e63946, #ff4d6d);
      color: white;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    button:hover {
      transform: scale(1.05);
    }

    .petal {
      position: absolute;
      top: -50px;
      font-size: 24px;
      animation: fall linear infinite;
      z-index: 1;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(360deg);
      }
    }
  </style>
</head>
<body>

  <div id="cover" style="position:fixed;inset:0;background:linear-gradient(135deg,#ff4d6d,#ff8fab);display:flex;align-items:center;justify-content:center;z-index:5;">
    <button onclick="openSurprise()" style="padding:18px 35px;font-size:18px;border:none;border-radius:40px;background:white;color:#e63946;box-shadow:0 10px 30px rgba(0,0,0,0.3);">
      Open Your Surprise 💝
    </button>
  </div>

  <div class="card" id="mainCard" style="display:none;">
    <h1>Happy Rose Day 🌹</h1>
    <div class="rose">🌹</div>
    <p id="typing"></p>
    <div class="name">From Aneez ❤️<br>To Asim 💖</div>
    <button onclick="showLove()">A Special Message 💌</button>
  </div>

  <script>
    function openSurprise(){
      document.getElementById('cover').style.display='none';
      document.getElementById('mainCard').style.display='block';
      typeText();
    }

    function showLove() {
      alert('Happy Rose Day Asim 🌹\nYou are very special to me ❤️');
    }

    const text = "This rose is not just a flower, it’s my feelings for you 🌸\nThank you for making my days brighter 💖\nMay our bond always bloom beautifully.";
    let i = 0;
    function typeText(){
      if(i < text.length){
        document.getElementById('typing').innerHTML += text.charAt(i);
        i++;
        setTimeout(typeText, 45);
      }
    }

    for (let i = 0; i < 25; i++) {
      let heart = document.createElement('div');
      heart.innerHTML = '💕';
      heart.className = 'petal';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
      heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
      document.body.appendChild(heart);
    }
  </script>

</body>
</html>
